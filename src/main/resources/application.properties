#Mongodb Configuration
spring.data.mongodb.uri=mongodb://localhost:27017/resumeBuilder


# Email Configuration
spring.mail.host=${BREVO_SMTP_HOST}
spring.mail.port=587
spring.mail.username=${BREVO_SMTP_USERNAME}
spring.mail.password=${BREVO_SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.from=${BREVO_SMTP_FROM_EMAIL}

#Application info
app.base.url=http://localhost:8080

#Cloudinary Information
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

#JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=604800000

#RazorPay Configuration
razorpay.key.id=${RAZORPAY_KEY_ID}
razorpay.key.secret=${RAZORPAY_KEY_SECRET}

